<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Dopamine Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dopamine background orbs -->
  <div class="dopamine-orb"></div>
  <div class="dopamine-orb"></div>
  <div class="dopamine-orb"></div>

  <!-- Calculator -->
  <div class="calculator-shell">
    <div class="calc-header">
      <div class="calc-title">
        <div class="calc-title-dot"></div>
        <span>Dopamine Calculator</span>
      </div>
      <div class="calc-mode-pill">
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="calc-display">
      <div class="display-top">
        <div class="display-history"></div>
        <div class="display-status">
          <div class="display-status-pill">dopamine safe</div>
        </div>
      </div>
      <div class="display-main">
        <div class="display-expression"></div>
        <div class="display-value"></div>
        <div class="display-glow-line"></div>
      </div>
    </div>

    <div class="calc-grid">
      <button class="btn btn-secondary">
        AC
        <span class="btn-label-sub">reset</span>
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-secondary">
        ±
        <span class="btn-label-sub">sign</span>
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-secondary">
        %
        <span class="btn-label-sub">mod</span>
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-operator">
        ÷
        <div class="btn-ghost-glow"></div>
      </button>

      <button class="btn">
        7
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        8
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        9
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-operator">
        ×
        <div class="btn-ghost-glow"></div>
      </button>

      <button class="btn">
        4
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        5
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        6
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-operator">
        −
        <div class="btn-ghost-glow"></div>
      </button>

      <button class="btn">
        1
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        2
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        3
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-operator" id="add">
        +
        <div class="btn-ghost-glow"></div>
      </button>

      <button class="btn btn-zero">
        0
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn">
        ,
        <div class="btn-ghost-glow"></div>
      </button>
      <button class="btn btn-accent">
        =
        <span class="btn-label-sub">dopamine</span>
        <div class="btn-ghost-glow"></div>
      </button>
    </div>
  </div>

  <script src="add.js"></script>
</body>
</html>
